server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:mysql://localhost:3307/groceryflow_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # validate: JPA kiểm tra entity có khớp schema không — không tạo/xóa bảng
      # Flyway quản lý schema, JPA chỉ validate
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: nếu DB đã tồn tại trước khi dùng Flyway, không báo lỗi
    baseline-on-migrate: true

app:
  jwt:
    # Phải giống secret trong api-gateway — user-service sign, api-gateway verify
    secret: groceryflow-dev-secret-key-minimum-32-chars!!
    expiration-ms: 86400000        # 24 giờ
    refresh-expiration-ms: 604800000  # 7 ngày

logging:
  level:
    com.groceryflow.userservice: DEBUG
